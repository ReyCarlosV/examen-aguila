<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Bird Recreator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar custom-navbar shadow-lg">
        <div class="container-fluid justify-content-center text-center py-2">
            <span class="navbar-brand mb-0 h1 fs-3 fw-bold text-warning">
                <i class="bi bi-palette-fill"></i> Canvas Bird Recreator
            </span>
            <div class="w-100 text-secondary small">Recreación Geométrica via JavaScript & HTML5 Canvas</div>
        </div>
    </nav>

    <main class="container-fluid my-5 flex-grow-1 px-md-5">
        <div class="row g-5 align-items-stretch">

            <div class="col-12 col-lg-6">
                <div class="card h-100 custom-card">
                    <div class="card-header border-0 bg-transparent pt-4 pb-0 text-center">
                        <h5 class="card-title text-info fw-bold">
                            <i class="bi bi-braces-asterisk"></i> Imagen Programada (Canvas)
                        </h5>
                        <p class="text-muted small">Generada dinámicamente con JS</p>
                    </div>
                    <div class="card-body d-flex align-items-center justify-content-center p-4">
                        <canvas id="birdCanvas" width="1280" height="720" class="w-100 rounded-3 custom-media-shadow bg-white"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6">
                <div class="card h-100 custom-card">
                    <div class="card-header border-0 bg-transparent pt-4 pb-0 text-center">
                        <h5 class="card-title text-warning fw-bold">
                            <i class="bi bi-image-fill"></i> Imagen Original de Referencia
                        </h5>
                        <p class="text-muted small">Modelo a seguir (aguila_original.png)</p>
                    </div>
                    <div class="card-body d-flex align-items-center justify-content-center p-4">
                        <img src="assets/img/aguila_original.png" alt="Referencia Original" class="img-fluid rounded-3 custom-media-shadow bg-white">
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="custom-footer text-center py-4 mt-auto shadow-lg">
        <div class="container">
            <p class="mb-1 fw-bold text-light">Aplicación de Dibujo Programático</p>
            <p class="mb-1 text-secondary small">Desarrollado por: <span class="text-info fw-bold">ReyCarlosV</span></p>
            <p class="mb-0 text-secondary small">© 2026 | Graficacion</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
